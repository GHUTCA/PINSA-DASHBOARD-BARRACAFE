<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0714">
<title>Pídele al DJ · MOCKUP</title>
<!-- DEVICE-CLASS: 1 · telefono del cliente (dentro il menù digitale) -->
<!-- ════════════════════════════════════════════════════════════════════
     MOCKUP_PIDELE_AL_DJ_v1.html · 09-jul-2026 · Cantiere MENU
     Il lato CLIENTE del modulo DJ Request — CON L'API VERA DENTRO
     (iTunes Search, gratuita, senza chiave, via JSONP → funziona anche
     senza CORS). Il pagamento è teatro; la búsqueda è REALE.

     ALLA ROVESCIA (decisione Alberto 09-lug): è LA CASA (il Comandante)
     che decide cosa si può suonare — géneros permessi dal foglio
     (PARAMETROS: dj_generos_permitidos + dj_modo genero sugerido|estricto
     + dj_precio). Il DJ eredita e conserva solo l'ultima parola (PASO).
     In questo mockup la barra "LA CASA PERMITE" è interattiva apposta:
     gioca a fare il Comandante e guarda il buscador obbedire.

     COSA TESTARE (è il motivo del mockup):
     · che género dà iTunes ai pezzi veri (badge su ogni risultato)
     · modo SUGERIDO (avvisa ma lascia) vs ESTRICTO (blocca)
     · copertine vere → dritte nelle card della cabina
     ════════════════════════════════════════════════════════════════════ -->
<style>
  :root{
    --bg:#0a0714; --panel:#130e20; --panel2:#1a1330; --bord:rgba(255,255,255,.09);
    --t1:#f4f0ff; --t2:#a89fc7; --t3:#6f668f;
    --neon:#00ffc8; --mag:#ff2e88; --vio:#8b5cf6; --gold:#ffcf6b; --bad:#ff5470;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    font-family:system-ui,-apple-system,'Segoe UI',sans-serif}
  html,body{background:var(--bg);color:var(--t1);min-height:100%}
  body{max-width:430px;margin:0 auto;padding:16px 14px 120px;
    background:radial-gradient(500px 300px at 90% -5%, rgba(139,92,246,.18), transparent 60%),var(--bg)}
  button{font-family:inherit;cursor:pointer}

  .head{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .disc{width:44px;height:44px;border-radius:50%;flex:0 0 auto;position:relative;
    background:repeating-radial-gradient(circle at 50% 50%, #0c0a14 0 2px, #171126 2px 4px);
    border:1.5px solid rgba(255,255,255,.15);animation:spin 3s linear infinite}
  .disc::after{content:'';position:absolute;inset:16px;border-radius:50%;
    background:linear-gradient(135deg,var(--mag),var(--vio))}
  @keyframes spin{to{transform:rotate(360deg)}}
  h1{font-size:22px;font-weight:900;letter-spacing:-.01em}
  .sub{font-size:12px;color:var(--t3);margin-bottom:14px}
  .demo-tag{font-size:10px;font-weight:900;color:var(--gold);border:1px solid var(--gold);
    border-radius:7px;padding:2px 6px;vertical-align:middle}

  /* ═════ LA CASA PERMITE (il Comandante — interattivo per il test) ═════ */
  .casa{background:var(--panel);border:1.5px solid var(--bord);border-radius:16px;padding:12px 14px;margin-bottom:14px}
  .casa .lbl{font-size:10px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
  .gchips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
  .gchip{font-size:12.5px;font-weight:800;border-radius:10px;padding:6px 11px;cursor:pointer;
    background:var(--panel2);border:1.5px solid var(--bord);color:var(--t3)}
  .gchip.on{border-color:var(--neon);color:var(--neon);background:rgba(0,255,200,.08)}
  .modo{display:flex;gap:8px;align-items:center;font-size:11.5px;color:var(--t3)}
  .modo button{font-size:11.5px;font-weight:800;border-radius:8px;padding:5px 10px;
    background:var(--panel2);border:1.5px solid var(--bord);color:var(--t3)}
  .modo button.on{border-color:var(--vio);color:#c9b8ff}

  /* ═════ BUSCADOR ═════ */
  .buscar{position:relative;margin-bottom:10px}
  .buscar input{width:100%;background:var(--panel);border:2px solid var(--vio);border-radius:16px;
    color:var(--t1);padding:15px 16px 15px 46px;font-size:16px;outline:none}
  .buscar input:focus{border-color:var(--neon);box-shadow:0 0 20px rgba(0,255,200,.15)}
  .buscar .lupa{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:18px}
  .estado{font-size:12px;color:var(--t3);min-height:16px;margin:0 4px 8px}

  /* ═════ RISULTATI ═════ */
  .res{display:flex;gap:12px;align-items:center;background:var(--panel);border:1.5px solid var(--bord);
    border-radius:14px;padding:10px;margin-bottom:8px;cursor:pointer;transition:transform .12s}
  .res:active{transform:scale(.985)}
  .res img{width:56px;height:56px;border-radius:10px;flex:0 0 auto;background:var(--panel2)}
  .res .b{flex:1;min-width:0}
  .res .tit{font-size:15px;font-weight:800;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .res .art{font-size:12.5px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .gen{display:inline-block;font-size:10.5px;font-weight:800;border-radius:7px;padding:2px 7px;margin-top:4px;
    background:rgba(0,255,200,.1);border:1px solid rgba(0,255,200,.4);color:var(--neon)}
  .gen.fuera{background:rgba(245,166,35,.1);border-color:rgba(255,207,107,.45);color:var(--gold)}
  .res .plata{font-size:15px;font-weight:900;color:var(--neon);white-space:nowrap}
  .res.bloq{opacity:.45;cursor:not-allowed}
  .res.bloq .plata{color:var(--t3);font-size:11px;font-weight:700;max-width:86px;white-space:normal;text-align:right}
  .aviso-fuera{font-size:11px;color:var(--gold);margin-top:3px}

  /* ═════ SHEET CONFERMA ═════ */
  .sheet{position:fixed;left:50%;transform:translateX(-50%) translateY(110%);bottom:0;width:100%;max-width:430px;
    background:var(--panel2);border:1.5px solid var(--vio);border-bottom:0;border-radius:22px 22px 0 0;
    padding:18px 18px calc(20px + env(safe-area-inset-bottom,0));transition:.28s;z-index:60}
  .sheet.up{transform:translateX(-50%) translateY(0)}
  .sheet .row{display:flex;gap:12px;align-items:center;margin-bottom:12px}
  .sheet img{width:64px;height:64px;border-radius:12px}
  .sheet .tit{font-size:17px;font-weight:900}
  .sheet .art{font-size:13px;color:var(--t2)}
  .sheet .nota-dj{width:100%;background:var(--panel);border:1.5px solid var(--bord);border-radius:12px;
    color:var(--t1);padding:11px 12px;font-size:14px;outline:none;margin-bottom:12px}
  .sheet .warn{font-size:12px;color:var(--gold);margin-bottom:12px}
  .b-pagar{display:block;width:100%;border:0;border-radius:14px;padding:16px;font-size:17px;font-weight:900;
    background:linear-gradient(90deg,var(--neon),#00c8a0);color:#04120d}
  .b-cerrar{display:block;width:100%;border:0;background:none;color:var(--t3);font-size:13px;padding:12px 0 0}
  .regla{font-size:11px;color:var(--t3);text-align:center;margin-top:10px;line-height:1.5}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(90px);
    background:var(--panel2);border:1.5px solid var(--neon);color:var(--t1);border-radius:14px;
    padding:12px 20px;font-size:14px;font-weight:800;opacity:0;transition:.25s;z-index:70;
    max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="head">
  <div class="disc"></div>
  <div>
    <h1>Pídele al DJ 🎧</h1>
    <div class="sub">Esta noche: <b id="quienToca" style="color:var(--t2)">Comandante DJ</b> · <span class="demo-tag">MOCKUP · búsqueda REAL (iTunes)</span></div>
  </div>
</div>

<div class="casa">
  <div class="lbl">🏛 La casa permite esta noche <span style="color:var(--t3);text-transform:none;letter-spacing:0">(tú eres el Comandante — toca los chips)</span></div>
  <div class="gchips" id="gchips"></div>
  <div class="modo">
    modo:
    <button id="mSug" class="on" onclick="setModo('sugerido')">SUGERIDO · avisa</button>
    <button id="mEst" onclick="setModo('estricto')">ESTRICTO · bloquea</button>
  </div>
</div>

<div class="buscar">
  <span class="lupa">🔎</span>
  <input id="q" type="search" placeholder="Busca tu canción… (mín. 3 letras)" autocomplete="off">
</div>
<div class="estado" id="estado">La búsqueda es en vivo contra el catálogo iTunes (CL) — sin API key.</div>
<div id="resultados"></div>

<div class="sheet" id="sheet">
  <div class="row">
    <img id="shImg" src="" alt="">
    <div><div class="tit" id="shTit"></div><div class="art" id="shArt"></div><span class="gen" id="shGen"></span></div>
  </div>
  <div class="warn" id="shWarn"></div>
  <input class="nota-dj" id="shNota" maxlength="60" placeholder="💬 Mensaje para el DJ (opcional) — «para la mesa 12»">
  <button class="b-pagar" id="shPagar" onclick="pagar()">Pagar $2.000 y enviar a cabina 🛎</button>
  <div class="regla">El DJ tiene la última palabra: si no la pone, <b>te devolvemos la plata solos</b>.</div>
  <button class="b-cerrar" onclick="cerrarSheet()">cerrar</button>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═════ LA CASA (nel vero sistema: PARAMETROS del foglio, scritti dal Comandante) ═════
   Ogni "familia" raggruppa i géneros come li chiama iTunes — è la mappa da
   affinare col test: guarda i badge sui risultati veri e correggiamo. */
const FAMILIAS = [
  { id:'electro', label:'⚡ House / Electro', on:true,
    match:['house','dance','electrónica','electronic','techno','trance','deep house'] },
  { id:'urbano', label:'🔥 Urbano / Reggaetón', on:true,
    match:['urbano latino','latin urban','hip-hop','rap','reggaetón','reggaeton','trap latino'] },
  { id:'latino', label:'🕺 Latino / Cumbia', on:false,
    match:['música mexicana','pop latino','latino','latin','salsa y tropical','cumbia','banda','norteño'] },
  { id:'rockpop', label:'🎸 Rock / Pop', on:false,
    match:['rock','pop','alternativa','alternative','metal','indie','singer/songwriter'] },
];
let MODO = 'sugerido';        // PARAMETROS.dj_modo_genero
const PRECIO = 2000;          // PARAMETROS.dj_precio_cancion

const $ = id => document.getElementById(id);
const fmt = n => '$' + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
let toastT = null;
function toast(msg){ const el = $('toast'); el.className = 'toast show'; el.textContent = msg;
  clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show'), 3200); }

function renderCasa(){
  $('gchips').innerHTML = FAMILIAS.map(f =>
    '<span class="gchip' + (f.on ? ' on' : '') + '" onclick="toggleFam(\'' + f.id + '\')">' + f.label + '</span>').join('');
}
function toggleFam(id){ const f = FAMILIAS.find(x => x.id === id); f.on = !f.on; renderCasa(); refiltra(); }
function setModo(m){ MODO = m;
  $('mSug').classList.toggle('on', m === 'sugerido');
  $('mEst').classList.toggle('on', m === 'estricto');
  refiltra(); }

function generoPermitido(gen){
  const g = (gen || '').toLowerCase();
  return FAMILIAS.some(f => f.on && f.match.some(m => g.indexOf(m) >= 0 || m.indexOf(g) >= 0));
}

/* ═════ iTunes Search via JSONP (niente CORS, niente key) ═════ */
let debounceT = null, jsonpN = 0, ultimi = [];
$('q').addEventListener('input', () => {
  clearTimeout(debounceT);
  const term = $('q').value.trim();
  if (term.length < 3) { $('resultados').innerHTML = ''; $('estado').textContent = 'Escribe al menos 3 letras…'; return; }
  $('estado').textContent = 'Buscando «' + term + '»…';
  debounceT = setTimeout(() => buscar(term), 450);
});
function buscar(term){
  const cb = 'itunesCb' + (++jsonpN);
  window[cb] = (data) => {
    delete window[cb];
    ultimi = (data.results || []).map(r => ({
      id: r.trackId, tit: r.trackName, art: r.artistName,
      gen: r.primaryGenreName || '—', img: (r.artworkUrl100 || '').replace('100x100','120x120') }));
    $('estado').textContent = ultimi.length
      ? ultimi.length + ' resultados de iTunes · el badge es el género REAL que da la API'
      : 'Nada con ese nombre — prueba con artista + canción.';
    refiltra();
  };
  const s = document.createElement('script');
  s.src = 'https://itunes.apple.com/search?term=' + encodeURIComponent(term) +
    '&entity=song&limit=8&country=CL&callback=' + cb;
  s.onerror = () => { $('estado').textContent = '⚠ Sin conexión con iTunes — reintenta.'; };
  document.body.appendChild(s);
}
function refiltra(){
  if (!ultimi.length) { $('resultados').innerHTML = ''; return; }
  $('resultados').innerHTML = ultimi.map((r, i) => {
    const ok = generoPermitido(r.gen);
    const bloq = !ok && MODO === 'estricto';
    return '<div class="res' + (bloq ? ' bloq' : '') + '" onclick="' + (bloq ? '' : 'abrirSheet(' + i + ')') + '">' +
      '<img src="' + r.img + '" alt="" loading="lazy">' +
      '<div class="b"><div class="tit">' + r.tit + '</div><div class="art">' + r.art + '</div>' +
        '<span class="gen' + (ok ? '' : ' fuera') + '">' + r.gen + (ok ? '' : ' · fuera de la carta') + '</span>' +
        (!ok && !bloq ? '<div class="aviso-fuera">⚠ esta noche no va — el DJ puede pasar (y te devolvemos)</div>' : '') +
      '</div>' +
      '<div class="plata">' + (bloq ? 'la casa no lo permite esta noche' : fmt(PRECIO)) + '</div></div>';
  }).join('');
}

/* ═════ SHEET + pago (teatro) ═════ */
let sel = null;
function abrirSheet(i){
  sel = ultimi[i];
  $('shImg').src = sel.img; $('shTit').textContent = sel.tit; $('shArt').textContent = sel.art;
  const ok = generoPermitido(sel.gen);
  $('shGen').className = 'gen' + (ok ? '' : ' fuera'); $('shGen').textContent = sel.gen;
  $('shWarn').textContent = ok ? '' : '⚠ Fuera de la carta de la noche — el DJ puede pasar; si pasa, reembolso automático.';
  $('shPagar').textContent = 'Pagar ' + fmt(PRECIO) + ' y enviar a cabina 🛎';
  $('sheet').classList.add('up');
}
function cerrarSheet(){ $('sheet').classList.remove('up'); }
function pagar(){
  cerrarSheet();
  toast('🎧 «' + sel.tit + '» viajando a la cabina — ' + fmt(PRECIO) + ' (mockup: aquí iría Fintoc)');
}
renderCasa();
</script>
</body>
</html>
