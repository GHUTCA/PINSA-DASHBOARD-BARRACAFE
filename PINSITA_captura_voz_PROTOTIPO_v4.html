<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>PINSITA · V1</title>
<style>
  :root{
    --bg:#1F2329; --panel:#2A2F36; --panel2:#323840; --line:#3D444D;
    --t1:#F2F0ED; --t2:#B8B2AA; --t3:#7A7570;
    --acc:#4A90D9; --acc2:#3D7BC4; --ok:#3FA66A; --warn:#D9923F; --bad:#C45A4A;
    --r:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--t1);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;max-width:560px;margin:0 auto;min-height:100dvh}
  button{font-family:inherit}

  /* ===== GATE operador ===== */
  .gate{position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;
    justify-content:center;padding:30px 22px}
  .gate h2{font-size:20px;margin:0 0 6px}
  .gate p{color:var(--t2);font-size:13px;margin:0 0 20px;line-height:1.5}
  .who{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .who button{flex:1;min-width:80px;background:var(--panel2);border:1px solid var(--line);color:var(--t1);
    font-size:17px;font-weight:600;padding:18px 10px;border-radius:14px}
  .who button:active{background:var(--acc);border-color:var(--acc)}
  .other{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--t1);
    border-radius:12px;padding:14px;font-size:15px}
  .ios-go{width:100%;background:var(--acc);border:none;color:#fff;border-radius:12px;
    padding:14px;font-size:15px;font-weight:600;margin-top:10px}

  /* ===== HEADER (verbo + contexto) ===== */
  .top{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--line);
    padding:10px 14px 8px}
  .top-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .brand{display:flex;align-items:center;gap:8px}
  .brand .nm{font-weight:700;letter-spacing:.3px}
  .opchip{background:var(--acc);color:#fff;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
  .ubic{font-size:12px;color:var(--t3)}
  .verbo-wrap{margin-top:8px;display:flex;align-items:center;gap:8px}
  .verbo-wrap label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
  .verbo{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--t1);
    border-radius:12px;padding:11px 13px;font-size:15px;font-weight:600;-webkit-appearance:none;appearance:none}

  /* ===== LISTA (crece) ===== */
  .list{flex:1;overflow-y:auto;padding:10px 14px 4px}
  .empty{color:var(--t3);font-size:13px;text-align:center;padding:40px 16px;line-height:1.6}
  .row{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:11px 12px;margin-bottom:8px}
  .row .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .row .dot.ok{background:var(--ok)} .row .dot.warn{background:var(--warn)} .row .dot.bad{background:var(--bad)}
  .row .nme{flex:1;min-width:0}
  .row .pn{font-weight:600;font-size:15px}
  .row .pn.bad{color:var(--bad)}
  .row .uo{font-size:11px;color:var(--t3);margin-top:2px}
  .row .uo b{color:var(--t2);font-weight:600}
  .row .q{font-size:15px;color:var(--t1);white-space:nowrap;font-variant-numeric:tabular-nums}
  .row .q.miss{color:var(--bad);font-weight:600}
  .mini{display:flex;gap:4px;flex-shrink:0}
  .mini button{background:transparent;border:none;font-size:15px;padding:5px 4px;color:var(--t2);opacity:.78}
  .mini button:active{opacity:1}
  /* candidatos (warn) */
  .cands{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .pill{font-size:13px;background:var(--panel2);border:1px solid var(--line);color:var(--t1);
    padding:7px 12px;border-radius:13px}
  .pill.on{background:var(--acc);border-color:var(--acc);color:#fff}
  .pill.ghost{border:none;color:var(--acc)}
  .rowwrap.warn{border:1px solid var(--warn);border-radius:12px;padding:10px;margin-bottom:8px;background:rgba(217,146,63,.05)}
  .rowwrap.bad{border:1px solid var(--bad);border-radius:12px;padding:10px;margin-bottom:8px;background:rgba(196,90,74,.06)}
  .rowwrap .row{background:transparent;border:none;padding:2px 0;margin:0}

  /* ===== PICKER live (Puerta D) ===== */
  .picker{background:var(--panel);border:1px solid var(--acc);border-radius:14px;padding:12px;margin-bottom:8px}
  .pk-row{display:flex;gap:8px;align-items:center}
  .pk-q{width:62px;flex:0 0 62px;background:var(--bg);border:1px solid var(--line);color:var(--t1);
    border-radius:10px;padding:11px 6px;font-size:16px;text-align:center}
  .pk-in{flex:1;min-width:0;background:var(--bg);border:1px solid var(--line);color:var(--t1);
    border-radius:10px;padding:11px 13px;font-size:16px}
  .pk-q:focus,.pk-in:focus{outline:none;border-color:var(--acc)}
  .pk-x{flex:0 0 auto;background:transparent;border:none;color:var(--t2);font-size:20px;padding:0 4px}
  .pk-hint{font-size:11px;color:var(--t3);margin-top:7px}
  .pk-list{margin-top:8px;max-height:260px;overflow-y:auto;border-radius:10px}
  .pk-opt{display:flex;align-items:center;gap:10px;width:100%;text-align:left;
    background:var(--panel2);border:1px solid var(--line);border-bottom:none;color:var(--t1);padding:11px 13px;font-size:15px}
  .pk-opt:first-child{border-radius:10px 10px 0 0}
  .pk-opt:last-child{border-bottom:1px solid var(--line);border-radius:0 0 10px 10px}
  .pk-opt:active{background:var(--acc);border-color:var(--acc)}
  .pk-nm{flex:1;min-width:0}
  .pk-sub{font-size:11px;color:var(--t3);margin-top:2px}
  .pk-badge{font-size:10px;color:var(--t3);border:1px solid var(--line);border-radius:8px;padding:2px 6px;white-space:nowrap}
  .pk-empty{padding:14px;color:var(--t3);font-size:13px;text-align:center}
  .pk-ok{width:100%;margin-top:10px;background:var(--panel2);border:1px solid var(--ok);color:var(--ok);
    border-radius:11px;padding:13px;font-size:15px;font-weight:600}
  .pk-ok.ready{background:var(--ok);color:#fff;border-color:var(--ok)}
  .pk-ok:active{transform:scale(.98)}

  /* ===== PORTE (barra inferior, siempre presente en COMPONI) ===== */
  .audio{display:none;align-items:center;gap:8px;justify-content:center;padding:8px;color:var(--t2);font-size:13px}
  .audio.on{display:flex}
  .bars{display:inline-flex;gap:3px;height:16px;align-items:flex-end}
  .bars span{width:3px;background:var(--acc);border-radius:2px;animation:b .8s infinite}
  .bars span:nth-child(2){animation-delay:.15s}.bars span:nth-child(3){animation-delay:.3s}.bars span:nth-child(4){animation-delay:.45s}
  @keyframes b{0%,100%{height:4px}50%{height:16px}}
  .portes{border-top:1px solid var(--line);background:var(--bg);padding:10px 14px;display:flex;gap:8px}
  /* bloque inferior sticky: foto + porte juntas, ancladas abajo (fix 4) */
  .bottombar{position:sticky;bottom:0;background:var(--bg);z-index:15}
  .bottombar .foto-imbocco{border-top:1px solid var(--line)}
  .porta{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--t1);border-radius:13px;
    padding:13px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:12px;font-weight:600}
  .porta .ic{font-size:22px;line-height:1}
  .porta:active{transform:scale(.96)}
  .porta.rec{background:var(--bad);border-color:var(--bad);color:#fff}
  .porta.soon{opacity:.5}
  .porta .tag{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px}
  .porta.soon .tag{color:var(--t3)}

  /* barra REVISAR / CONFIRMAR */
  .actionbar{border-top:1px solid var(--line);background:var(--bg);padding:12px 14px;display:flex;
    gap:10px;align-items:center;position:sticky;bottom:0}
  .actionbar .stat{flex:1;font-size:13px;color:var(--t2)}
  .actionbar .stat b{color:var(--t1)}
  .btn-rev{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--t1);
    border-radius:12px;padding:14px;font-size:15px;font-weight:600}
  .btn-confirm{background:var(--acc);border:none;color:#fff;border-radius:12px;padding:14px 22px;font-size:15px;font-weight:600}
  .btn-confirm:disabled{opacity:.45}

  /* foto = botón aparte (imbocco) */
  .foto-imbocco{text-align:center;padding:6px 0 2px}
  .foto-imbocco button{background:transparent;border:1px dashed var(--line);color:var(--t2);
    border-radius:12px;padding:9px 16px;font-size:13px}

  .done{text-align:center;padding:50px 20px;color:var(--ok);font-size:17px}
  .done span{display:block;color:var(--t2);font-size:13px;margin-top:8px}
  .hand{background:transparent;border:none;color:var(--t3);font-size:12px;text-decoration:underline}
</style>
</head>
<body>
  <!-- GATE -->
  <div class="gate" id="gate">
    <h2>¿Quién está capturando?</h2>
    <p>Toca tu nombre. Queda registrado quién hizo cada movimiento. Puedes cambiarlo después.</p>
    <div class="who" id="whoList"></div>
    <input class="other" id="otherName" placeholder="…u otro nombre, escríbelo aquí">
    <button class="ios-go" id="otherGo">Empezar</button>
  </div>

  <!-- HEADER · verbo + contexto -->
  <div class="top">
    <div class="top-row">
      <div class="brand"><span class="nm">PINSITA</span><span class="opchip" id="opChip">—</span></div>
      <span class="ubic" id="ubic">Riesco · BLocal</span>
    </div>
    <div class="verbo-wrap">
      <label>acción</label>
      <select class="verbo" id="verbo"></select>
    </div>
  </div>

  <!-- LISTA (crece) -->
  <div class="list" id="list">
    <div class="empty" id="empty">Elige una acción arriba.<br>Luego usa una puerta abajo para sumar productos.<br>La lista crece aquí.</div>
  </div>

  <!-- AUDIO feedback -->
  <div class="audio" id="audio"><span id="audioTxt">escuchando…</span>
    <span class="bars"><span></span><span></span><span></span><span></span></span></div>

  <!-- BLOQUE INFERIOR STICKY: foto (imbocco) + porte. La foto NO se va con el scroll (fix 4) -->
  <div class="bottombar" id="bottombar">
    <div class="foto-imbocco" id="fotoImbocco">
      <button id="btnFoto">📷 Sacar foto y seguir después (sospeso)</button>
    </div>
    <!-- PORTE · orden: QR · Teclado · Voz (fix 3) -->
    <div class="portes" id="portes">
      <button class="porta soon" id="pQR"><span class="ic">▦</span>QR<span class="tag">pronto</span></button>
      <button class="porta" id="pTeclado"><span class="ic">⌨️</span>Teclado<span class="tag">escribe</span></button>
      <button class="porta" id="pVoz"><span class="ic">🎤</span>Voz<span class="tag">dicta</span></button>
    </div>
  </div>

  <!-- ACTION BAR (revisar / confirmar) -->
  <div class="actionbar" id="actionbar" style="display:none">
    <div class="stat" id="stat">—</div>
    <button class="btn-rev" id="btnVolver" style="display:none">‹ Volver</button>
    <button class="btn-confirm" id="btnConfirm">Confirmar</button>
  </div>

  <!-- barra inferior: revisar -->
  <div class="actionbar" id="revbar" style="display:none">
    <div class="stat" id="statC">—</div>
    <button class="btn-confirm" id="btnRevisar">Revisar ›</button>
  </div>

  <div style="text-align:center;padding:6px 0 12px">
    <button class="hand" id="btnHand">cambiar a zurdo ↔</button> &nbsp;·&nbsp;
    <button class="hand" id="btnOp">cambiar operador</button>
  </div>

  var headers=_splitCSVLine(lines[0]).map(function(h){return h.trim();});
  return lines.slice(1).map(function(l){
    var vals=_splitCSVLine(l), o={};
    headers.forEach(function(h,i){ o[h]=(vals[i]||'').trim(); });
    return o;
  }).filter(function(r){ return Object.values(r).some(function(v){return v!=='';}); });
}
async function cargarVocabDesdeBD(){
  try{
    var rBD=await fetch(_csvMaestro(GID_BD),{cache:'no-store'});
    if(!rBD.ok) throw new Error('BD '+rBD.status);
    var bd=_parseCSV(await rBD.text());
    if(!bd.length || bd[0].SKU===undefined) throw new Error('BD vacía o sin header SKU');
    // alias (puede fallar sin romper el VOCAB base)
    var aliasMap={};
    try{
      var rAL=await fetch(_csvMaestro(GID_ALIAS),{cache:'no-store'});
      if(rAL.ok){ _parseCSV(await rAL.text()).forEach(function(a){
        var sku=String(a.SKU||'').trim(), al=norm(a.alias||'');
        if(sku&&al){ (aliasMap[sku]=aliasMap[sku]||[]).push(al); }
      }); }
    }catch(e){}
    var nuevo=[];
    bd.forEach(function(r){
      var sku=String(r.SKU||'').trim(); if(!sku) return;
      var activo=String(r['Activo No/Activo']||'').trim().toLowerCase();
      if(activo==='no') return;  // inactivos no entran al cerebro
      var secsRaw=String(r.Seccion||'').toLowerCase();
      var secs=secsRaw.split(',').map(function(s){return s.trim();}).filter(Boolean);
      nuevo.push({
        sku:sku, nombre:String(r.Descripcion||'').trim(),
        utm:String(r.UTM||'').trim(),
        secs:secs.length?secs:['cocina central'],
        alias:aliasMap[sku]||[],
        metodo:String(r['Metodo de conteo']||'').trim(),
        factor:String(r['Facor UO UTM']||'').trim(),
        uo:String(r['UO Descripcion Principal ']||r['UO Descripcion Principal']||'').trim()  // lo que el OP confirma
      });
    });
    if(nuevo.length<100) throw new Error('BD insuficiente ('+nuevo.length+')');
    VOCAB=nuevo; rebuildNameIdx();
    return {ok:true, n:VOCAB.length, fuente:'BD_INSUMOS vivo'};
  }catch(e){
    return {ok:false, error:e.message, fuente:'fallback embebido ('+VOCAB.length+')'};
  }
}

// fuzzy: token_set_ratio simplificado (Sørensen sobre bigramas de caracteres + cobertura tokens)
function bigrams(s){var r=[];s=' '+s+' ';for(var i=0;i<s.length-1;i++)r.push(s.substr(i,2));return r;}
function diceScore(a,b){
  if(!a||!b)return 0;
  if(a===b)return 100;
  var A=bigrams(a),B=bigrams(b),m=0,used={};
  for(var i=0;i<A.length;i++){for(var j=0;j<B.length;j++){if(!used[j]&&A[i]===B[j]){used[j]=1;m++;break;}}}
  return Math.round(200*m/(A.length+B.length));
}
function interpret(frase){
  var toks=norm(frase).split(' ').filter(Boolean);
  var joined=' '+toks.join(' ')+' ';
  var verbo='?'; toks.forEach(function(t){ if(VERBS[t]) verbo=VERBS[t]; });
  var destino=null; DESTINOS.forEach(function(d){ if(joined.indexOf(' '+d+' ')>=0 && !destino) destino=d; });
  var secProd=[]; SEC_PRODUCTO.forEach(function(s){ if(joined.indexOf(' '+s+' ')>=0) secProd.push(s); });
  var qty=null, unidad=null;
  toks.forEach(function(t){
    if(/^\d+([.,]\d+)?$/.test(t)) qty=parseFloat(t.replace(',','.'));
    else if(NUMWORD[t]!=null) qty=NUMWORD[t];
    if(UNITS[t]) unidad=UNITS[t];
  });
  // tokens-nombre: saca stop, números, unidades, numword, verbos, palabras destino/sección
  var destWords=new Set();
  DESTINOS.concat(SEC_PRODUCTO).forEach(function(s){ s.split(' ').forEach(function(w){destWords.add(w);}); });
  var nameToks=toks.filter(function(t){
    return !STOP.has(t) && !/^\d+$/.test(t) && !UNITS[t] && NUMWORD[t]==null && !VERBS[t] && !destWords.has(t);
  });
  // n-gramas 3..1
  var grams=[];
  [3,2,1].forEach(function(n){ for(var i=0;i+n<=nameToks.length;i++) grams.push(nameToks.slice(i,i+n).join(' ')); });
  var best=[];
  grams.forEach(function(gram){
    NAME_IDX.forEach(function(ni){
      var sc=diceScore(gram,ni.key);
      // boost si el gram está contenido o contiene (cubre singular/plural)
      if(ni.key.indexOf(gram)>=0||gram.indexOf(ni.key)>=0) sc=Math.max(sc,82);
      if(sc<60) return;
      var bonus=(secProd.length && secProd.some(function(s){return (ni.v.secs||[]).indexOf(s)>=0;}))?10:0;
      best.push({sc:sc+bonus, gram:gram, v:ni.v});
    });
  });
  best.sort(function(a,b){return b.sc-a.sc;});
  var seen={}, out=[];
  best.forEach(function(b){ if(seen[b.v.sku])return; seen[b.v.sku]=1; out.push(b); });
  return {verbo:verbo,qty:qty,unidad:unidad,destino:destino,secProd:secProd,cands:out.slice(0,4)};
}

/* ===== LISTA: una dictada -> varios items (corte por cada nueva cantidad) =====
   El TIPO (verbo/destino) NO se busca aquí: viene del dropdown de cabecera.
   El cerebro solo interpreta la lista de productos. Robusto sin puntuación:
   cada número o numword abre un item nuevo; coma / salto de línea refuerzan el corte.
*/
function isQtyTok(t){ return /^\d+([.,]\d+)?$/.test(t) || NUMWORD[t]!=null; }
function splitItems(frase){
  var s=(frase||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  s=s.replace(/(\d),(\d)/g,'$1\u00b7$2');   // protege decimal "1,5" (· temporal) antes de tratar la coma
  s=s.replace(/[\n;]+/g,' , ').replace(/,/g,' , ');  // saltos y comas = separador explícito
  s=s.replace(/(\d)([a-z]+)/g,'$1 $2');     // "1kg" -> "1 kg" (número pegado a unidad)
  s=s.replace(/\u00b7/g,',');                // restaura el decimal: 1·5 -> 1,5
  var rawToks=s.replace(/[^a-z0-9,. ]/g,' ').replace(/\s+/g,' ').trim().split(' ').filter(Boolean);
  var items=[], cur=[];
  function push(){ var s=cur.join(' ').trim(); if(s) items.push(s); cur=[]; }
  rawToks.forEach(function(t){
    if(t===','){ if(cur.length) push(); return; }          // coma = refuerzo de corte
    if(isQtyTok(t) && cur.some(isQtyTok)){ push(); }        // ya había una cantidad en el item -> nuevo item
    cur.push(t);
  });
  push();
  return items;
}
// parsea UNA fila ya troceada: saca qty/unidad en cualquier orden + candidatos por nombre
function parseRow(rowText){
  var prepped=(rowText||'').replace(/(\d)[.,](\d)/g,'$1dot$2'); // protege decimal de norm()
  var toks=norm(prepped).split(' ').filter(Boolean).map(function(t){ return t.replace(/(\d)dot(\d)/g,'$1.$2'); });
  var qty=null, unidad=null;
  toks.forEach(function(t){
    if(/^\d+([.,]\d+)?$/.test(t)){ if(qty==null) qty=parseFloat(t.replace(',','.')); }
    else if(NUMWORD[t]!=null){ if(qty==null) qty=NUMWORD[t]; }
    if(UNITS[t]) unidad=UNITS[t];
  });
  var nameToks=toks.filter(function(t){
    return !STOP.has(t) && !/^\d+$/.test(t) && !UNITS[t] && NUMWORD[t]==null && !VERBS[t];
  });
  var grams=[];
  [3,2,1].forEach(function(n){ for(var i=0;i+n<=nameToks.length;i++) grams.push(nameToks.slice(i,i+n).join(' ')); });
  var best=[];
  grams.forEach(function(gram){
    NAME_IDX.forEach(function(ni){
      var sc=diceScore(gram,ni.key);
      if(ni.key.indexOf(gram)>=0||gram.indexOf(ni.key)>=0) sc=Math.max(sc,82);
      if(sc<60) return;
      best.push({sc:sc, gram:gram, v:ni.v});
    });
  });
  best.sort(function(a,b){return b.sc-a.sc;});
  var seen={}, out=[];
  best.forEach(function(b){ if(seen[b.v.sku])return; seen[b.v.sku]=1; out.push(b); });
  return {qty:qty, unidad:unidad, cands:out.slice(0,4)};
}
// LISTA completa -> filas. tipo (verbo/destino) lo fija el dropdown, no la voz.
function interpretLista(frase, tipo){
  return splitItems(frase).map(function(rowText, i){
    var r=parseRow(rowText);
    return {
      pos:i+1, said:rowText.trim(),
      qty:r.qty, unidad:r.unidad,
      cands:r.cands,
      sku: r.cands.length ? r.cands[0].v.sku : null,   // null = nomatch (N21: said+pos+qty se conservan igual)
      tipo: tipo||null
    };
  });
}

/* ===== PUERTA D · búsqueda al teclado (superficie WhatsApp, motor nuestro) =====
   Híbrido (decisión 18-jun): primero los que EMPIEZAN por lo escrito (lo que el pulgar
   espera), después los fonéticamente cercanos por diceScore (rescata "tomatte"->Tomate).
   Reusa NAME_IDX + diceScore + cleanName: NO es un cerebro nuevo, es el mismo de la voz.
   Devuelve VOCAB-items únicos (no claves de índice), tope configurable. */
function searchProductos(q, limit){
  limit = limit || 8;
  var nq = norm(q);
  if(!nq) return [];
  var byPrefix=[], byContains=[], byFuzzy=[], seen={};
  NAME_IDX.forEach(function(ni){
    var sku = ni.v.sku;
    if(seen[sku]) return;            // un producto una vez (su mejor entrada gana)
    var key = ni.key;
    if(key.indexOf(nq)===0){ seen[sku]=1; byPrefix.push(ni.v); }       // empieza por: cima
    else if(key.indexOf(nq)>=0){ seen[sku]=1; byContains.push(ni.v); } // contiene: medio
    else {
      var sc = diceScore(nq, key);
      if(sc>=58){ seen[sku]=1; byFuzzy.push({v:ni.v, sc:sc}); }        // parecido fonético: abajo
    }
  });
  byFuzzy.sort(function(a,b){return b.sc-a.sc;});
  // orden de relevancia: prefijo (alfabético por nombre), contiene, fuzzy
  byPrefix.sort(function(a,b){return cleanName(a.nombre).localeCompare(cleanName(b.nombre));});
  byContains.sort(function(a,b){return cleanName(a.nombre).localeCompare(cleanName(b.nombre));});
  return byPrefix
    .concat(byContains)
    .concat(byFuzzy.map(function(x){return x.v;}))
    .slice(0, limit);
}

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function skuItem(sku){ return VOCAB.filter(function(x){return x.sku===sku;})[0]; }
function skuUO(sku){ var v=skuItem(sku); return (v&&v.uo)?v.uo:''; }
function skuSec(sku){ var v=skuItem(sku); return (v&&v.secs&&v.secs.length)?v.secs[0]:''; }

function render(){
  closePicker();

  if(!ITEMS.length){
    if(!window.__vocabCargando) setEmptyMsg('ready');
    emptyEl.style.display='block';
    listEl.querySelectorAll('.rowwrap,.row,.picker').forEach(function(n){n.remove();});

  emptyEl.style.display='none';
  // limpia filas previas (deja el empty)
  listEl.querySelectorAll('.rowwrap,.row').forEach(function(n){n.remove();});

    var uo=skuUO(it.sku), sec=it.sub||skuSec(it.sku);
    var sub = (uo? ('en <b>'+esc(uo)+'</b>'):'') + (uo&&sec?' · ':'') + (sec?esc(capSec(sec)):'');

      var row=document.createElement('div'); row.className='row'; row.id='row-'+idx;

        '<div class="nme"><div class="pn">'+esc(it.nombre||'')+'</div>'+
        (sub?'<div class="uo">'+sub+'</div>':'')+'</div>'+ qHtml +
        '<span class="mini">'+
          '<button data-eq="'+idx+'" title="cantidad">#</button>'+
          '<button data-ed="'+idx+'" title="cambiar">✎</button>'+
          '<button data-rm="'+idx+'" title="quitar">🗑</button></span>';
      listEl.appendChild(row);
    } else if(it.estado==='warn'){
      var w=document.createElement('div'); w.className='rowwrap warn'; w.id='row-'+idx;
      var pills=(it.cands||[]).slice(0,3).map(function(c){
        return '<button class="pill'+(c.sku===it.sku?' on':'')+'" data-pick="'+idx+'" data-sku="'+c.sku+'">'+esc(c.nombre)+' <span style="opacity:.6">'+c.sc+'</span></button>';
      }).join('');
      w.innerHTML='<div class="row"><span class="dot warn"></span>'+
        '<div class="nme"><div class="pn">'+esc(it.nombre||'')+'</div>'+
        '<div class="uo">dijiste: "'+esc(it.said||'')+'"</div></div>'+qHtml+'</div>'+
        '<div class="cands">'+pills+'<button class="pill ghost" data-ed="'+idx+'">escribir…</button>'+
        '<button class="pill ghost" data-rm="'+idx+'">quitar</button></div>';
      listEl.appendChild(w);
    } else { // bad
      var b=document.createElement('div'); b.className='rowwrap bad'; b.id='row-'+idx;
      b.innerHTML='<div class="row"><span class="dot bad"></span>'+
        '<div class="nme"><div class="pn bad">Sin coincidencia</div>'+
        '<div class="uo">oíste: "'+esc(it.said||'')+'"</div></div>'+qHtml+'</div>'+
        '<div class="cands"><button class="pill ghost" data-ed="'+idx+'">⌨ escribir</button>'+
        '<button class="pill ghost" data-rm="'+idx+'">quitar</button></div>';
      listEl.appendChild(b);
    }
  });
  // engancha
  listEl.querySelectorAll('[data-pick]').forEach(function(b){ b.onclick=function(){ pickCand(+b.dataset.pick,b.dataset.sku); }; });
  listEl.querySelectorAll('[data-ed]').forEach(function(b){ b.onclick=function(){ abrirPickerFix(+b.dataset.ed); }; });
  listEl.querySelectorAll('[data-eq]').forEach(function(b){ b.onclick=function(){ editarQ(+b.dataset.eq); }; });
  listEl.querySelectorAll('[data-rm]').forEach(function(b){ b.onclick=function(){ quitar(+b.dataset.rm); }; });
  listEl.scrollTop=listEl.scrollHeight;
  if(ESTADO==='componi') setEstado('componi');
  actualizarStats();
}

function actualizarStats(){
  var n=ITEMS.length;
  var listos=ITEMS.filter(function(x){return x.estado==='ok' && x.qty!=null;}).length;
  var pend=n-listos;
  // barra revisar (componi)
  $('statC').innerHTML = n? ('<b>'+n+'</b> en la lista'+(pend?' · '+pend+' por revisar':'')) : '';
  $('btnRevisar').textContent='Revisar ('+n+') ›';
  // barra confirmar (rivedi)
  $('stat').innerHTML='<b>'+listos+' de '+n+'</b> listos'+(pend?' · '+pend+' por revisar':'');
  $('btnConfirm').disabled = (n===0 || pend>0);
  $('btnConfirm').textContent = pend>0 ? ('Faltan '+pend) : 'Confirmar';
}

// ---------- acciones de fila ----------
function quitar(idx){ ITEMS.splice(idx,1); render(); }
function editarQ(idx){
  var it=ITEMS[idx];
  var dec=skuDecimal(it.sku);
  var v=prompt('Cantidad'+(skuUO(it.sku)?(' en '+skuUO(it.sku)):'')+' para "'+(it.nombre||it.said)+'":', it.qty!=null?it.qty:'');
  if(v===null) return;
  v=String(v).trim().replace(',','.');
  if(v===''){ it.qty=null; }
  else { var num=parseFloat(v); if(!isNaN(num)){ it.qty = dec?num:Math.round(num); } }
  render();
}
function pickCand(idx, sku){
  var it=ITEMS[idx], c=(it.cands||[]).filter(function(x){return x.sku===sku;})[0]; if(!c) return;
  if(it.sku!==sku) pushAlias(it.said, sku, c.nombre);
  it.sku=sku; it.nombre=c.nombre; it.estado='ok'; it.sub=skuSec(sku);
  render();
}

// ---------- cola alias (N22, nunca fuente) ----------
function pushAlias(said,sku,nombre){
  try{ var k='pinsita_alias_cola'; var cola=JSON.parse(localStorage.getItem(k)||'[]');
    cola.push({ts:new Date().toISOString(),operador:OPERADOR,said:said,sku:sku,nombre:nombre});
    localStorage.setItem(k,JSON.stringify(cola)); }catch(e){}
}

// ===================== PORTE: ingest común =====================
// Toda puerta vierte en la MISMA lista vía ingest(). La Q es obligatoria a la nacita (natura registrar).
function ingestFrase(text, fromVoice){
  if(!text||!text.trim()) return;
  var rows=interpretLista(text, verboSel.value);
  rows.forEach(function(r){
    var top=r.cands.length?r.cands[0]:null;
    var gap=r.cands.length>1?(r.cands[0].sc-r.cands[1].sc):99;
    var estado;
    if(!top) estado='bad';
    else if(top.sc<82||gap<15) estado='warn';
    else estado='ok';
    ITEMS.push({ said:r.said, qty:(r.qty!=null?r.qty:null),
      sku:top?top.v.sku:null, nombre:top?top.v.nombre:null,
      sub:top?skuSec(top.v.sku):'', estado:estado,
      cands:r.cands.map(function(b){return {sku:b.v.sku,nombre:b.v.nombre,sc:b.sc};}) });
  });
  render();
  // si quedó alguna fila sin Q y el verbo la exige, avisamos abriendo edición de Q en la primera sin Q
  if(verboActual().qReq){ var i=ITEMS.findIndex(function(x){return x.qty==null;});
    if(i>=0 && fromVoice){ /* en voz la Q suele venir; si falta, queda marcada 'falta Q' visible */ } }
}

// ---------- PUERTA VOZ ----------
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
var IS_IOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
var srec=null, son=false, silenceTimer=null, lastAt=0, SILENCE_MS=4500; // fix #6: 3s -> 4.5s
var sttBuffer='', sttLast='';
function armSilence(){ clearTimeout(silenceTimer); silenceTimer=setTimeout(function(){ stopVoz(); }, SILENCE_MS); }
function flushVoz(){ var t=(sttBuffer+' '+sttLast).trim().replace(/\s+/g,' '); sttBuffer='';sttLast='';
  if(t) ingestFrase(t,true); }
function startVoz(){
  if(son) return;
  if(!SR){ // iOS: dictado por teclado del sistema vía picker de teclado
    abrirPickerAdd(true); return; }
  srec=new SR(); srec.lang='es-CL'; srec.continuous=true; srec.interimResults=true; srec.maxAlternatives=1;
  sttBuffer='';sttLast='';
  srec.onstart=function(){ son=true; $('pVoz').classList.add('rec'); audio.classList.add('on');
    audioTxt.textContent='escuchando…'; armSilence(); };
  srec.onresult=function(e){ var interim='';
    for(var i=e.resultIndex;i<e.results.length;i++){ var r=e.results[i];
      if(r.isFinal){ var seg=r[0].transcript.trim(); if(seg){
        var a=seg.toLowerCase(), b=sttLast.toLowerCase();
        if(a===b){} else if(a.indexOf(b)===0){ sttLast=seg; }
        else if(b.indexOf(a)===0 && b){} else { sttBuffer=(sttBuffer+' '+sttLast).trim(); sttLast=seg; }
      }} else interim+=r[0].transcript; }
    lastAt=Date.now();
    var prev=(sttBuffer+' '+sttLast+' '+interim).trim().replace(/\s+/g,' ');
    audioTxt.textContent = prev?('… '+prev.slice(-46)):'escuchando…'; armSilence(); };
  srec.onerror=function(e){ if(e.error==='no-speech'){ armSilence(); return; } audioTxt.textContent='error: '+(e.error||'?'); };
  srec.onend=function(){ if(son && Date.now()-lastAt < SILENCE_MS-200){ try{srec.start();return;}catch(ex){} }
    son=false; $('pVoz').classList.remove('rec'); audio.classList.remove('on'); clearTimeout(silenceTimer); flushVoz(); };
  lastAt=Date.now(); try{ srec.start(); }catch(ex){}
}
function stopVoz(){ if(srec&&son){ son=false; try{srec.stop();}catch(ex){} }
  clearTimeout(silenceTimer); $('pVoz').classList.remove('rec'); audio.classList.remove('on'); flushVoz(); }
$('pVoz').onclick=function(){ son?stopVoz():startVoz(); };

// ---------- PICKER (alta a mano y corrección) ----------
function closePicker(){ if(pickerEl){ pickerEl.remove(); pickerEl=null; } }
function buildPicker(mode, idx){
  closePicker();
  var host=document.createElement('div'); host.className='picker'; pickerEl=host;
  var qInit=(mode==='fix'&&ITEMS[idx]&&ITEMS[idx].qty!=null)?ITEMS[idx].qty:'';
  host.innerHTML=
    '<div class="pk-row">'+
      '<input class="pk-q" inputmode="decimal" placeholder="cant." value="'+esc(String(qInit))+'">'+
      '<input class="pk-in" placeholder="escribe el producto…" autocomplete="off" autocapitalize="off" spellcheck="false">'+
      '<button class="pk-x">✕</button></div>'+
    '<div class="pk-hint" id="pkHint">La cantidad es obligatoria.</div>'+
    '<div class="pk-list" id="pkList"></div>'+
    '<button class="pk-ok" id="pkOk" style="display:none">✓ Agregar</button>';
  var qEl=host.querySelector('.pk-q'), inEl=host.querySelector('.pk-in'),
      xEl=host.querySelector('.pk-x'), listE=host.querySelector('#pkList'),
      hintE=host.querySelector('#pkHint'), okBtn=host.querySelector('#pkOk');
  var chosen=null;
  function refreshOk(){
    if(chosen){ var uo=skuUO(chosen.sku); var q=qEl.value.trim();
      okBtn.style.display='block';
      okBtn.textContent = '✓ Agregar '+chosen.nombre + (q?(' · '+q+(uo?(' '+uo):'')):' · falta cantidad');
      okBtn.classList.toggle('ready', q!=='');
    } else { okBtn.style.display='none'; }
  }
  function refreshHint(){
    if(chosen){ var uo=skuUO(chosen.sku);
      hintE.innerHTML = '<b style="color:var(--t1)">'+esc(chosen.nombre)+'</b>'+(uo?(' · en <b style="color:var(--t2)">'+esc(uo)+'</b>'):'')+
        ' · '+esc(capSec(skuSec(chosen.sku)))+' — escribe la cantidad y confirma con ✓';
    } else hintE.textContent='Busca el producto, pon la cantidad, y confirma con ✓.';
    refreshOk();
  }
  function commit(){
    if(!chosen){ inEl.focus(); return; }
    var raw=qEl.value.trim().replace(',','.');
    if(raw===''){ qEl.focus(); qEl.style.borderColor='var(--bad)'; hintE.innerHTML='<span style="color:var(--bad)">Falta la cantidad — no se puede agregar sin Q.</span>'; return; }
    var num=parseFloat(raw); if(isNaN(num)){ qEl.focus(); return; }
    var qty = skuDecimal(chosen.sku)?num:Math.round(num);
    if(mode==='fix'){ var it=ITEMS[idx];
      if(it.sku!==chosen.sku) pushAlias(it.said, chosen.sku, chosen.nombre);
      it.sku=chosen.sku; it.nombre=chosen.nombre; it.estado='ok'; it.sub=skuSec(chosen.sku); it.qty=qty;
    } else {
      ITEMS.push({ said:'(a mano) '+chosen.nombre, qty:qty, sku:chosen.sku, nombre:chosen.nombre,
        sub:skuSec(chosen.sku), estado:'ok', cands:[{sku:chosen.sku,nombre:chosen.nombre,sc:100}] });
    }
    closePicker(); render();
  }
  function paint(){
    var res=searchProductos(inEl.value, 8);
    if(!inEl.value.trim()){ listE.innerHTML='<div class="pk-empty">Escribe para buscar entre los '+VOCAB.length+' productos.</div>'; return; }
    if(!res.length){ listE.innerHTML='<div class="pk-empty">Nada parecido a "'+esc(inEl.value)+'".</div>'; return; }
    listE.innerHTML=res.map(function(v){ var uo=(v.uo||'').trim(); var sec=capSec((v.secs&&v.secs[0])||'');
      var sub=(uo?('en '+uo):'')+(uo&&sec?' · ':'')+(sec||'');
      return '<button class="pk-opt" data-sku="'+v.sku+'"><span class="pk-nm">'+esc(v.nombre)+
        (sub?'<div class="pk-sub">'+esc(sub)+'</div>':'')+'</span><span class="pk-badge">'+esc(v.sku)+'</span></button>';
    }).join('');
    listE.querySelectorAll('.pk-opt').forEach(function(b){ b.onclick=function(){
      // FIX 1: elegir NO agrega solo — fija la elección y muestra ✓ Agregar (no se pierde)
      chosen=skuItem(b.dataset.sku); inEl.value=chosen.nombre; listE.innerHTML=''; refreshHint();
      if(qEl.value.trim()===''){ qEl.focus(); } // espera la Q + confirmación ✓
    };});
  }
  inEl.addEventListener('input', function(){ chosen=null; paint(); refreshHint(); });
  inEl.addEventListener('keydown', function(e){ if(e.key==='Enter'){ var f=listE.querySelector('.pk-opt'); if(f){ f.click(); } else if(chosen) commit(); }
    if(e.key==='Escape') closePicker(); });
  qEl.addEventListener('input', refreshOk);
  qEl.addEventListener('keydown', function(e){ if(e.key==='Enter') commit(); });
  okBtn.onclick=commit;
  xEl.onclick=function(){
    // FIX 1: si hay algo elegido/escrito sin confirmar, avisa antes de descartar
    if(chosen || qEl.value.trim() || inEl.value.trim()){
      if(!confirm('Hay un producto sin confirmar. ¿Descartarlo?')) return;
    }
    closePicker();
  };
  return host;
}
function abrirPickerAdd(focusFromVoice){
  // en COMPONI agregamos al final de la lista
  var host=buildPicker('add', null);
  listEl.appendChild(host); emptyEl.style.display='none';
  var inEl=host.querySelector('.pk-in'); if(inEl) inEl.focus();
  listEl.scrollTop=listEl.scrollHeight;
}
function abrirPickerFix(idx){
  var host=buildPicker('fix', idx);
  var anchor=$('row-'+idx);
  if(anchor&&anchor.parentNode) anchor.parentNode.insertBefore(host, anchor.nextSibling);
  else listEl.appendChild(host);
  var inEl=host.querySelector('.pk-in'); if(inEl) inEl.focus();
}

// ---------- CONFIRMAR · firma + escritura GAS (N16: destino por sección) ----------
var GAS_RIESCO='https://script.google.com/macros/s/AKfycbzPnXz0WOXEiV1qtCrE1xKM2imfr2Ac3tzwrB5ysp9trqPNcLwUePnop70R-_0bsF-A/exec';
async function callGAS(payload){ try{
  var r=await fetch(GAS_RIESCO,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});
  var t=await r.text(); try{return JSON.parse(t);}catch(e){return {ok:true};} }catch(e){ return {ok:false,error:e.toString()}; } }

$('btnConfirm').onclick=async function(){
  if($('btnConfirm').disabled) return;
  var v=verboActual();
  // confirmación explícita (fix #3)
  if(!confirm('Vas a generar un movimiento:\n\n'+v.label+'\n'+ITEMS.length+' producto(s) · '+OPERADOR+'\n\n¿Confirmar?')) return;
  $('btnConfirm').disabled=true; $('btnConfirm').textContent='Enviando…';
  var tipo=v.id;
  var res;
  if(tipo==='Entrega Secc'){
    // N16: agrupar por sección del producto, un batch por sección
    var grupos={};
    ITEMS.forEach(function(it){ var sec=capSec(skuSec(it.sku)||'Cocina Central');
      (grupos[sec]=grupos[sec]||[]).push(it); });
    res={ok:true, scritti:0};
    var secs=Object.keys(grupos);
    for(var s=0;s<secs.length;s++){
      var sec=secs[s], items=grupos[sec].map(function(x){
        return { sku:x.sku, desc:x.nombre, unidad:'UO', uoDesc:skuUO(x.sku)||'', cantidad:x.qty, obs:'pinsita · '+(x.said||'') }; });
      var r1=await callGAS({ action:'registrarEntregaBatch', local:'Riesco', destino:sec,
        responsable:OPERADOR, items:items });
      if(r1&&r1.ok) res.scritti+=items.length; else { res.ok=false; res.error=(r1&&r1.error)||'fallo sección '+sec; break; }
    }
  } else {
    var origen=(tipo==='Ingreso BLoc')?'Bodega Central':(tipo==='Ingreso Proveedor')?'Proveedor':'Bodega Local';
    res={ok:true,scritti:0};
    for(var i=0;i<ITEMS.length;i++){ var it=ITEMS[i];
      var r2=await callGAS({ action:'registrarMovimiento', tipo:tipo, origen:origen, destino:'Bodega Local',
        sku:it.sku, desc:it.nombre, unidad:'UO', cantidad:it.qty, responsable:OPERADOR, obs:'pinsita · '+(it.said||'') });
      if(r2&&r2.ok) res.scritti++; else { res.ok=false; res.error=(r2&&r2.error)||'fallo item '+(i+1); break; }
    }
  }
  if(res&&res.ok){
    var n=res.scritti||ITEMS.length;
    listEl.querySelectorAll('.rowwrap,.row').forEach(function(x){x.remove();});
    emptyEl.style.display='none';
    var d=document.createElement('div'); d.className='done';
    d.innerHTML='✓ Registrado en el sistema<span>'+n+' productos · '+OPERADOR+' · '+v.label+'</span>';
    listEl.appendChild(d);
    actionbar.style.display='none'; revbar.style.display='none'; portes.style.display='none';
    ITEMS.length=0;
    setTimeout(function(){ d.remove(); setEstado('componi'); render(); }, 1900);
  } else {
    $('btnConfirm').disabled=false; $('btnConfirm').textContent='Reintentar';
    alert('No se pudo registrar: '+((res&&res.error)||'error')+'\nLa lista NO se perdió.');
  }
};
