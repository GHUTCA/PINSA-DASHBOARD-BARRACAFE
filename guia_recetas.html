<!DOCTYPE html>
<!-- ════════════════════════════════════════════════════════════════════
     PINSA · GUÍA DE RECETAS · v1.0 · 09-JUL-2026
     DEVICE-CLASS: 3-dual (mobile-first — il personale del locale)

     La superficie di CONSULTA del ricettario: foto, ingredienti, passi,
     perfect serve. ZERO economia (costi/prezzi vivono nel Taller).
     Mostra solo ACTIVA + ACTIVA_SIN_DATA (il ricettario reale).
     Additiva: pinsa_guia_recetas (vecchia) resta finché questa non è collaudata.
     Fonte: stessi CSV pubblicati del Taller · Design: NORMA v1.4 light.
     ════════════════════════════════════════════════════════════════════ -->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guía de Recetas · PINSA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f3f4f6; --panel:#fff; --panel2:#f7f8fa; --line:#d8dce3;
    --txt:#1a1d23; --txt2:#4a5060; --txt3:#9aa1ad;
    --indigo:#5a63c8; --cc:#7c5f9e; --green:#37855c; --amber:#b26f00;
    --shadow:0 1px 3px rgba(20,25,35,.07), 0 4px 14px rgba(20,25,35,.05);
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent}
  body{background:var(--bg); color:var(--txt); font:15px/1.5 Inter,-apple-system,'Segoe UI',sans-serif; min-height:100vh}
  button{font:inherit; cursor:pointer; border:none; background:none; color:inherit}
  input{font:inherit; background:#fff; color:var(--txt); border:1px solid var(--line); border-radius:10px; padding:11px 14px; outline:none; width:100%}
  input:focus{border-color:var(--cc)}
  ::placeholder{color:var(--txt3)}

  header{position:sticky; top:0; background:rgba(243,244,246,.96); backdrop-filter:blur(6px); z-index:20; padding:12px 16px 10px; border-bottom:1px solid var(--line)}
  .toprow{display:flex; align-items:center; gap:10px; margin-bottom:10px}
  .logo{font-weight:800; font-size:15px}
  .logo em{color:var(--cc); font-style:normal}
  .ver{font-size:10px; color:var(--txt3); margin-left:auto}
  .chips{display:flex; gap:8px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{white-space:nowrap; font-size:12.5px; font-weight:700; padding:6px 14px; border-radius:99px; border:1px solid var(--line); color:var(--txt2); background:#fff}
  .chip.on{background:var(--cc); border-color:var(--cc); color:#fff}

  main{max-width:760px; margin:0 auto; padding:14px 14px 90px}
  .loading{text-align:center; color:var(--txt3); padding:60px 0}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px}
  .rcard{background:var(--panel); border:1px solid var(--line); border-radius:14px; overflow:hidden; box-shadow:var(--shadow); text-align:left; display:flex; flex-direction:column}
  .rcard .ph{height:110px; background:var(--panel2); display:flex; align-items:center; justify-content:center; color:var(--txt3); font-size:22px; overflow:hidden}
  .rcard .ph img{width:100%; height:100%; object-fit:cover}
  .rcard .tx{padding:10px 12px}
  .rcard .n{font-weight:700; font-size:13.5px; line-height:1.25}
  .rcard .s{font-size:11px; color:var(--txt3); margin-top:3px}

  /* dettaglio a schermo pieno (mobile) */
  .sheet{position:fixed; inset:0; background:var(--bg); z-index:40; overflow-y:auto; display:none}
  .sheet.open{display:block}
  .shead{position:sticky; top:0; display:flex; align-items:center; gap:10px; padding:12px 16px; background:rgba(243,244,246,.96); backdrop-filter:blur(6px); border-bottom:1px solid var(--line); z-index:5}
  .back{font-size:14px; font-weight:700; color:var(--cc)}
  .sbody{max-width:760px; margin:0 auto; padding:0 16px 60px}
  .bigph{margin:14px -16px 0; height:240px; background:var(--panel2); display:flex; align-items:center; justify-content:center; color:var(--txt3); overflow:hidden}
  .bigph img{width:100%; height:100%; object-fit:cover}
  h1{font-size:21px; font-weight:800; margin:16px 0 4px}
  .meta{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px}
  .badge{font-size:10.5px; font-weight:800; padding:3px 10px; border-radius:99px; border:1px solid}
  .badge.cc{background:rgba(124,95,158,.1); color:var(--cc); border-color:var(--cc)}
  .badge.vta{background:rgba(55,133,92,.1); color:var(--green); border-color:var(--green)}
  .badge.base{background:rgba(90,99,200,.1); color:var(--indigo); border-color:var(--indigo)}
  .badge.info{background:var(--panel2); color:var(--txt2); border-color:var(--line)}
  .blk{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:14px; box-shadow:var(--shadow)}
  .blk h4{font-size:11.5px; text-transform:uppercase; letter-spacing:1px; color:var(--txt3); margin-bottom:10px; font-weight:800}
  .ing{display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eef0f3; font-size:14.5px}
  .ing:last-child{border-bottom:none}
  .ing b{font-variant-numeric:tabular-nums; color:var(--txt2); font-weight:600; white-space:nowrap; margin-left:12px}
  .subchip{font:700 10px 'JetBrains Mono',monospace; background:rgba(90,99,200,.1); border:1px solid var(--indigo); border-radius:6px; padding:1px 6px; color:var(--indigo)}
  .pasos{list-style:none; counter-reset:p}
  .pasos li{counter-increment:p; display:flex; gap:12px; padding:10px 0; border-bottom:1px solid #eef0f3; font-size:15px; align-items:baseline}
  .pasos li:last-child{border-bottom:none}
  .pasos li::before{content:counter(p); min-width:26px; height:26px; border-radius:99px; background:rgba(124,95,158,.1); border:1px solid var(--cc); color:var(--cc); font:800 13px Inter; display:inline-flex; align-items:center; justify-content:center}
  .ps{background:linear-gradient(180deg,rgba(55,133,92,.08),rgba(55,133,92,.02)); border:1.5px solid var(--green); border-radius:12px; padding:13px 15px; font-size:14.5px; margin-bottom:14px}
  .ps .t{font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--green); font-weight:800; display:block; margin-bottom:4px}
  .vbtn{display:inline-flex; align-items:center; gap:8px; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px 16px; font-weight:700; font-size:14px; color:var(--cc); text-decoration:none; box-shadow:var(--shadow)}
  .empty{text-align:center; color:var(--txt3); padding:50px 20px; font-size:14px}
</style>
</head>
<body>

<header>
  <div class="toprow">
    <div class="logo">PINSA · <em>Guía de Recetas</em></div>
    <span class="ver" id="ver">v1.1 · 09-jul</span>
  </div>
  <input id="q" placeholder="Busca receta o ingrediente…" oninput="renderGrid()" style="margin-bottom:10px">
  <div class="chips" id="chips">
    <button class="chip on" onclick="setSec(this,'')">Todas</button>
    <button class="chip" onclick="setSec(this,'Barra Alimentos')">Alimentos</button>
    <button class="chip" onclick="setSec(this,'Barra Cafe')">Café</button>
    <button class="chip" onclick="setSec(this,'Barra Jugos')">Jugos</button>
    <button class="chip" onclick="setSec(this,'Barra Helados')">Helados</button>
    <button class="chip" onclick="setSec(this,'Cocina Central')">CCentral</button>
  </div>
</header>

<main>
  <div class="loading" id="load">Cargando el recetario…</div>
  <div class="grid" id="grid" style="display:none"></div>
  <div class="empty" id="empty" style="display:none">Nada por acá todavía.</div>
</main>

<!-- dettaglio -->
<div class="sheet" id="sheet">
  <div class="shead">
    <button class="back" onclick="cerrar()">‹ Volver</button>
  </div>
  <div class="sbody" id="sbody"></div>
</div>

<script src="/shared/pinsita_auth.js"></script>
<script>
'use strict';
const BASE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRKfymDMvJd6XSSnfxuq2entJff2QwmEyKyvRRiiYVqNlwEA_rY7GXv0xVGC4k6746-EVAuLodfS9nt/pub?gid=';
const GID = { MASTER:'1643758434', DETALLE:'1714485150' };
const VISIBLES = ['ACTIVA','ACTIVA_SIN_DATA'];   // il ricettario reale — mai SIMULACION/ARCHIVADA

// v1.1 — scope empresa dallo scope `local` della sessione (come il Taller):
// locale fisico → la sua empresa · 'pinsa'/'bks'/'exo' → quella empresa · '*' → tutte
const LOCAL2EMP = { rsc:'PINSA', cdl:'PINSA', pinsa:'PINSA', bks:'BKS', exo:'EXO' };

let RECETAS = [], DETALLE = {}, sec = '', MI_EMP = 'PINSA';

window.addEventListener('DOMContentLoaded', () => {
  if (!window.PinsitaAuth) {
    document.getElementById('load').innerHTML = 'No encuentro /shared/pinsita_auth.js — este archivo vive en el repo.';
    return;
  }
  PinsitaAuth.init({ local:'*', accent:'#7c5f9e' });
  const chk = setInterval(() => {
    const s = (window.PinsitaAuth && PinsitaAuth.sesion) ? PinsitaAuth.sesion() : null;
    if (!s) return;
    clearInterval(chk);
    const scope = String(s.local || s.scope || '').trim().toLowerCase();
    MI_EMP = (scope === '*') ? '*' : (LOCAL2EMP[scope] || 'PINSA');
    cargar();
  }, 300);
});

async function cargar(){
  try {
    const [ma, de] = await Promise.all([csv(GID.MASTER), csv(GID.DETALLE)]);
    parseMaster(ma); parseDetalle(de);
    document.getElementById('load').style.display = 'none';
    document.getElementById('grid').style.display = '';
    renderGrid();
  } catch(e) {
    document.getElementById('load').textContent = 'No pude leer el recetario: ' + e.message;
  }
}

/* ── CSV quote-safe (identico al Taller) ── */
async function csv(gid){
  const r = await fetch(BASE_URL + gid + '&single=true&output=csv&_cb=' + Date.now());
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return parseCSV(await r.text());
}
function parseCSV(text){
  const rows = []; let row = [], cur = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"') { if (text[i+1] === '"') { cur += '"'; i++; } else inQ = false; }
      else cur += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(cur); cur = ''; }
      else if (c === '\n' || c === '\r') {
        if (c === '\r' && text[i+1] === '\n') i++;
        row.push(cur); cur = '';
        if (row.length > 1 || row[0] !== '') rows.push(row);
        row = [];
      } else cur += c;
    }
  }
  if (cur !== '' || row.length) { row.push(cur); rows.push(row); }
  return rows;
}
function idx(h, n){ return h.findIndex(x => String(x).trim() === n.trim()); }
function numCL(v){
  if (v === null || v === undefined) return 0;
  let s = String(v).trim().replace(/[$\s ]/g, '');
  if (!s || s === '-') return 0;
  const hasC = s.indexOf(',') >= 0, hasD = s.indexOf('.') >= 0;
  if (hasC && hasD) {
    if (s.lastIndexOf('.') > s.lastIndexOf(',')) s = s.replace(/,/g, '');
    else s = s.replace(/\./g, '').replace(',', '.');
  } else if (hasC) {
    if (/^-?\d{1,3}(,\d{3})+$/.test(s)) s = s.replace(/,/g, '');
    else s = s.replace(',', '.');
  } else if (hasD) {
    if (/^-?\d{1,3}(\.\d{3})+$/.test(s) && !/^-?\d+\.\d{1,2}$/.test(s)) s = s.replace(/\./g, '');
  }
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

function parseMaster(rows){
  const h = rows[0], c = n => idx(h, n);
  const map = { id:c('ID_Receta'), nombre:c('Nombre'), tipo:c('Tipo Receta'),
    seccion:c('Seccion'), estado:c('Estado'), formato:c('Formato'),
    unidad:c('Unidad salida'), qlote:c('Q lote std'), foto:c('URL_Foto'),
    video:c('URL_Video'), proc:c('Procedimiento'), ps:c('Perfect_Serve'), notas:c('Notas'),
    eP:c('Empresa_PINSA'), eE:c('Empresa_EXO'), eB:c('Empresa_BKS') };
  RECETAS = rows.slice(1).map(r => {
    const id = String(r[map.id]||'').trim();
    if (!id) return null;
    const estado = String(r[map.estado]||'').trim().toUpperCase();
    if (VISIBLES.indexOf(estado) < 0) return null;
    // v1.1: solo l'empresa dell'utente ('*' vede tutto; senza colonne = PINSA legacy)
    if (MI_EMP !== '*') {
      const col = MI_EMP === 'PINSA' ? map.eP : MI_EMP === 'EXO' ? map.eE : map.eB;
      const flag = col >= 0 ? String(r[col]||'').trim().toUpperCase() : '';
      const es = flag ? (flag === 'SI') : (MI_EMP === 'PINSA');
      if (!es) return null;
    }
    return { id, nombre:String(r[map.nombre]||'').trim(),
      tipo:String(r[map.tipo]||'').trim().toUpperCase(),
      seccion:String(r[map.seccion]||'').trim(),
      formato:String(r[map.formato]||'').trim(),
      unidad:String(r[map.unidad]||'').trim().toLowerCase(),
      qlote:numCL(r[map.qlote])||1,
      foto:String(r[map.foto]||'').trim(), video:String(r[map.video]||'').trim(),
      proc:String(r[map.proc]||'').trim(), ps:String(r[map.ps]||'').trim(),
      notas:String(r[map.notas]||'').trim() };
  }).filter(Boolean);
}
function parseDetalle(rows){
  const h = rows[0];
  const iId = idx(h,'ID_Receta'), iD = idx(h,'Descripcion'), iQ = idx(h,'Q_Lote'),
        iU = idx(h,'UM'), iS = idx(h,'Es_SubReceta');
  DETALLE = {};
  rows.slice(1).forEach(r => {
    const id = String(r[iId]||'').trim();
    if (!id) return;
    (DETALLE[id] = DETALLE[id] || []).push({
      descripcion:String(r[iD]||'').trim(), q:numCL(r[iQ])||0,
      um:String(r[iU]||'').trim(),
      esSub:String(r[iS]).toLowerCase() === 'true' });
  });
}

/* ── UI ── */
function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmtN(v){ return (v||0).toLocaleString('es-CL'); }
function setSec(btn, s){
  sec = s;
  document.querySelectorAll('#chips .chip').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderGrid();
}
function tipoBadge(t){
  if (t === 'PREPARACION') return '<span class="badge cc">CCENTRAL</span>';
  if (t === 'SUBRECETA')  return '<span class="badge base">BASE</span>';
  return '<span class="badge vta">VENTA</span>';
}
function renderGrid(){
  const q = (document.getElementById('q').value||'').toLowerCase();
  const list = RECETAS.filter(r => {
    if (sec && r.seccion.indexOf(sec) < 0) return false;
    if (!q) return true;
    if (r.nombre.toLowerCase().includes(q)) return true;
    return (DETALLE[r.id]||[]).some(i => i.descripcion.toLowerCase().includes(q));
  });
  document.getElementById('grid').innerHTML = list.map(r =>
    `<button class="rcard" onclick="abrir('${r.id}')">
       <div class="ph">${r.foto ? `<img src="${esc(r.foto)}" loading="lazy" onerror="this.remove()">` : '🍽'}</div>
       <div class="tx"><div class="n">${esc(r.nombre)}</div>
       <div class="s">${esc(r.seccion).replace('Cocina Central','CCentral')}</div></div>
     </button>`).join('');
  document.getElementById('empty').style.display = list.length ? 'none' : '';
}
function abrir(id){
  const r = RECETAS.find(x => x.id === id);
  if (!r) return;
  const ings = DETALLE[id] || [];
  const vidaM = r.notas.match(/\[vida:(\d+)\]/);
  const esCC = r.tipo === 'PREPARACION' || r.tipo === 'SUBRECETA';
  document.getElementById('sbody').innerHTML = `
    <div class="bigph">${r.foto ? `<img src="${esc(r.foto)}" onerror="this.parentNode.textContent='📷'">` : '📷 Sin foto todavía'}</div>
    <h1>${esc(r.nombre)}</h1>
    <div class="meta">
      ${tipoBadge(r.tipo)}
      <span class="badge info">${esc(r.seccion).replace('Cocina Central','CCentral')}</span>
      ${esCC ? `<span class="badge info">tanda ${fmtN(r.qlote)} ${esc(r.unidad)}</span>` : ''}
      ${esCC && r.formato ? `<span class="badge info">${esc(r.formato)}</span>` : ''}
      ${vidaM ? `<span class="badge info">⏳ dura ${vidaM[1]} días</span>` : ''}
    </div>
    ${r.ps ? `<div class="ps"><span class="t">Perfect serve</span>${esc(r.ps)}</div>` : ''}
    <div class="blk">
      <h4>Ingredientes</h4>
      ${ings.length ? ings.map(i =>
        `<div class="ing"><span>${esc(i.descripcion)}${i.esSub?' <span class="subchip">base</span>':''}</span>
         <b>${fmtN(i.q)} ${esc(i.um)}</b></div>`).join('') : '<div class="ing">—</div>'}
    </div>
    ${r.proc ? `<div class="blk"><h4>Cómo se hace</h4><ol class="pasos">${r.proc.split(' | ').map(p=>`<li><span>${esc(p)}</span></li>`).join('')}</ol></div>` : ''}
    ${r.video ? `<a class="vbtn" href="${esc(r.video)}" target="_blank" rel="noopener">🎬 Ver video explicativo</a>` : ''}`;
  document.getElementById('sheet').classList.add('open');
  document.getElementById('sheet').scrollTop = 0;
}
function cerrar(){ document.getElementById('sheet').classList.remove('open'); }
</script>
</body>
</html>
