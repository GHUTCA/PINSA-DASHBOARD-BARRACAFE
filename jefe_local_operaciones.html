<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PINSA · Sistema actualizado</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23C4622D'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-weight='bold' font-size='18' fill='white'>P</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<!--
  ════════════════════════════════════════════════════════════════════════
  REDIRECT LEGACY → PORTAL  ·  PINSITA
  ────────────────────────────────────────────────────────────────────────
  Este archivo SUSTITUYE a un punto de entrada legacy en la RAÍZ del repo.
  Su única función es llevar a quien tenga el link viejo guardado al portal
  oficial (portal.html), para que TODA la operación entre por una sola puerta
  y toda escritura quede con dueño real (PinsitaAuth).

  Aplicar este mismo contenido (idéntico) en los TRES archivos legacy de raíz:
    · index.html                      (landing histórico)
    · pinsa_home_jefe_local.html      (hub JL legacy)
    · jefe_local_operaciones.html     (panel operativo legacy · ESCRIBE en hojas)

  Como están en la raíz, el destino es "portal.html" (mismo nivel).
  NO usar en archivos dentro de cdl/ o rsc/ (esos son el flujo nuevo, válido).
  ════════════════════════════════════════════════════════════════════════
-->
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Inter',-apple-system,sans-serif;
    background:#0a0a0a;color:#fff;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:24px;
  }
  .wrap{max-width:440px}
  .logo{font-weight:800;font-size:30px;letter-spacing:.5px;color:#C4622D;margin-bottom:28px}
  .logo span{color:#fff}
  h1{font-size:20px;font-weight:700;margin-bottom:12px;line-height:1.3}
  p{font-size:14px;color:#9a9a9a;line-height:1.6;margin-bottom:28px}
  .spin{
    width:34px;height:34px;margin:0 auto 28px;
    border:3px solid rgba(196,98,45,.2);border-top-color:#C4622D;border-radius:50%;
    animation:rot .8s linear infinite;
  }
  @keyframes rot{to{transform:rotate(360deg)}}
  a.btn{
    display:inline-block;text-decoration:none;color:#fff;
    background:#C4622D;padding:12px 26px;border-radius:10px;
    font-size:14px;font-weight:600;transition:opacity .2s;
  }
  a.btn:hover{opacity:.88}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">PINSA<span>.</span></div>
    <div class="spin"></div>
    <h1>Hemos actualizado el sistema</h1>
    <p>Ahora se entra por un solo portal. Te estamos llevando ahí&hellip;<br>
       Guarda esta nueva dirección en tu favorito.</p>
    <a class="btn" href="portal.html">Ir al portal ahora</a>
  </div>
<script>
  // Redirect automático a los ~2s. replace() para que el "atrás" del navegador
  // no devuelva a esta página intermedia (evita bucles con el favorito viejo).
  setTimeout(function(){ window.location.replace('portal.html'); }, 2000);
</script>
</body>
</html>
